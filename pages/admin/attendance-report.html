<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Report - School Management System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- PDF Support -->
    <script src="../../js/pdf-snapshot.js"></script>
    <style>
        .report-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: center;
        }
    </style>
</head>

<body class="bg-light">
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../../assets/logo.png" alt="Logo" class="sidebar-logo">
                <h2>Idara Misbah ul Quran</h2>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Links rendered by JS -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="page-title">
                    <h1 id="pageTitle" data-i18n="attendance_report">Attendance Report</h1>
                </div>
                <div class="header-actions">
                    <div class="user-profile">
                        <div class="user-info">
                            <p id="userName" style="font-weight: 600;">User</p>
                            <p id="userRole" style="font-size: 0.75rem; color: var(--text-light);">Role</p>
                        </div>
                        <div class="avatar">U</div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="dashboard-content">
                <div class="stat-card" style="margin-bottom: 2rem;">
                    <h3 style="margin-bottom: 1rem;" data-i18n="select_criteria">Select Criteria</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label data-i18n="department">Department</label>
                            <select id="department" onchange="updateClasses()" required>
                                <option value="" data-i18n="select_department">Select Department</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label data-i18n="class">Class</label>
                            <select id="className" onchange="updateSubjects()" required>
                                <option value="" data-i18n="select_class">Select Class</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label data-i18n="subject">Subject</label>
                            <select id="subject" required>
                                <option value="" data-i18n="select_subject">Select Subject</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label data-i18n="month">Month</label>
                            <input type="month" id="reportMonth" class="form-control"
                                style="padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div class="form-group" style="display: flex; align-items: flex-end;">
                            <button class="btn-primary" onclick="loadReport()" data-i18n="view_report">View
                                Report</button>
                        </div>
                    </div>
                </div>

                <div class="stat-card" id="reportCard" style="display: none;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 data-i18n="monthly_report">Monthly Report</h3>
                        <button class="btn-primary" onclick="downloadReportPDF()" style="background-color: #ef4444;"
                            data-i18n="download_pdf">Download PDF</button>
                    </div>
                    <div class="table-container" id="reportContainer" style="overflow-x: auto;">
                        <table class="data-table" id="reportTable">
                            <!-- Dynamic Report -->
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="../../js/firebase-config.js"></script>
    <script src="../../js/translations.js"></script>
    <script src="../../js/script.js"></script>
    <script>
        // Data for dropdowns - DYNAMIC

        async function loadDepartments() {
            const select = document.getElementById('department');
            const currentVal = select.value;
            select.innerHTML = '<option value="" data-i18n="select_department">Select Department</option>';
            if (typeof updatePageLanguage === 'function') updatePageLanguage();

            try {
                const snapshot = await db.collection('departments').orderBy('name').get();
                snapshot.forEach(doc => {
                    const opt = document.createElement('option');
                    opt.value = doc.data().name;
                    opt.innerText = doc.data().name_ur || doc.data().name;
                    select.appendChild(opt);
                });
                if (currentVal) select.value = currentVal;
            } catch (error) {
                console.error("Error loading departments:", error);
            }
        }

        // Set today's date
        document.getElementById('reportMonth').value = new Date().toISOString().slice(0, 7); // YYYY-MM
        loadDepartments();

        async function updateClasses() {
            const dept = document.getElementById('department').value;
            const classSelect = document.getElementById('className');
            classSelect.innerHTML = '<option value="" data-i18n="select_class">Select Class</option>';
            document.getElementById('subject').innerHTML = '<option value="" data-i18n="select_subject">Select Subject</option>';
            if (typeof updatePageLanguage === 'function') updatePageLanguage();

            if (!dept) return;

            try {
                const snapshot = await db.collection('classes').where('department', '==', dept).get();
                const seen = new Set();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (!data.name) return;
                    const label = data.name_ur || data.name;
                    if (seen.has(label)) return;
                    seen.add(label);

                    const opt = document.createElement('option');
                    opt.value = data.name;
                    opt.innerText = label;
                    classSelect.appendChild(opt);
                });
            } catch (error) {
                console.error("Error loading classes:", error);
            }
        }

        async function updateSubjects() {
            const dept = document.getElementById('department').value;
            const className = document.getElementById('className').value;
            const subjectSelect = document.getElementById('subject');
            subjectSelect.innerHTML = '<option value="" data-i18n="select_subject">Select Subject</option>';
            if (typeof updatePageLanguage === 'function') updatePageLanguage();

            if (!dept || !className) return;

            try {
                const snapshot = await db.collection('subjects')
                    .where('department', '==', dept)
                    .where('className', '==', className)
                    .get();

                const subjects = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    subjects.push({ name: data.name, name_ur: data.name_ur, book: data.book || '', term: data.term || '' });
                });
                subjects.sort((a, b) => {
                    const aLabel = (typeof getSubjectDisplayName === 'function') ? getSubjectDisplayName(a) : (a.name_ur || a.name || '');
                    const bLabel = (typeof getSubjectDisplayName === 'function') ? getSubjectDisplayName(b) : (b.name_ur || b.name || '');
                    return aLabel.localeCompare(bLabel);
                });

                subjects.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.name;
                    opt.innerText = (typeof getSubjectDisplayName === 'function') ? getSubjectDisplayName(s) : (s.name_ur || s.name);
                    subjectSelect.appendChild(opt);
                });
            } catch (error) {
                console.error("Error loading subjects:", error);
            }
        }

        async function loadReport() {
            const dept = document.getElementById('department').value;
            const className = document.getElementById('className').value;
            const subject = document.getElementById('subject').value;
            const monthVal = document.getElementById('reportMonth').value; // YYYY-MM

            if (!dept || !className || !subject || !monthVal) {
                alert("Please select Department, Class, Subject and Month.");
                return;
            }

            const card = document.getElementById('reportCard');
            const table = document.getElementById('reportTable');
            card.style.display = 'block';
            table.innerHTML = '<tr><td style="text-align: center;">Loading Report...</td></tr>';

            try {
                const snapshot = await db.collection('attendance')
                    .where('department', '==', dept)
                    .where('className', '==', className)
                    .where('subject', '==', subject)
                    .get();

                const monthRecords = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.date.startsWith(monthVal)) {
                        monthRecords.push(data);
                    }
                });

                monthRecords.sort((a, b) => a.date.localeCompare(b.date));

                if (monthRecords.length === 0) {
                    table.innerHTML = '<tr><td style="text-align: center;">No attendance records found for this month.</td></tr>';
                    return;
                }

                const studentMap = new Map();
                monthRecords.forEach(rec => {
                    rec.records.forEach(r => {
                        if (!studentMap.has(r.uid)) {
                            studentMap.set(r.uid, r.name);
                        }
                    });
                });

                const students = Array.from(studentMap.entries()).map(([uid, name]) => ({ uid, name }));
                students.sort((a, b) => a.name.localeCompare(b.name));

                let thead = '<thead><tr><th data-i18n="student_name">Student Name</th>';
                monthRecords.forEach(rec => {
                    const day = rec.date.split('-')[2];
                    thead += `<th>${day}</th>`;
                });
                thead += '<th data-i18n="total_pal">Total (P/A/L)</th></tr></thead>';

                let tbody = '<tbody>';
                students.forEach(s => {
                    let row = `<tr><td>${s.name}</td>`;
                    let p = 0, a = 0, l = 0;

                    monthRecords.forEach(rec => {
                        const record = rec.records.find(r => r.uid === s.uid);
                        let status = record ? record.status : '-';
                        let color = 'black';
                        if (status === 'Present') { status = 'P'; color = 'green'; p++; }
                        else if (status === 'Absent') { status = 'A'; color = 'red'; a++; }
                        else if (status === 'Leave') { status = 'L'; color = 'orange'; l++; }

                        row += `<td style="color: ${color}; font-weight: bold;">${status}</td>`;
                    });

                    row += `<td><span style="color:green">${p}</span> / <span style="color:red">${a}</span> / <span style="color:orange">${l}</span></td></tr>`;
                    tbody += row;
                });
                tbody += '</tbody>';

                table.innerHTML = thead + tbody;
                updatePageLanguage();

            } catch (error) {
                console.error("Error loading report:", error);
                table.innerHTML = '<tr><td style="text-align: center; color: red;">Error loading report.</td></tr>';
            }
        }

        async function downloadReportPDF() {
            const btn = document.querySelector('button[onclick="downloadReportPDF()"]');
            if (btn) { btn.disabled = true; btn.innerText = "Generating..."; }

            try {
                const dept = document.getElementById('department').value;
                const className = document.getElementById('className').value;
                const subject = document.getElementById('subject').value;
                const monthVal = document.getElementById('reportMonth').value;

                const classUrdu = {
                    "Aamma Year 1": "عامہ سال اول",
                    "Aamma Year 2": "عامہ سال دوم",
                    "Khassa Year 1": "خاصہ سال اول",
                    "Khassa Year 2": "خاصہ سال دوم",
                    "Aliya Year 1": "عالیہ سال اول",
                    "Aliya Year 2": "عالیہ سال دوم",
                    "Alamiya Year 1": "عالمیہ سال اول",
                    "Alamiya Year 2": "عالمیہ سال دوم",
                    "Aamma Year 1 (Arabic Language Foundation Course)": "عامہ سال اول (عریبک لینگوئج کورس)",
                    "Aamma Year 2 (English Language Foundation Course)": "عامہ سال دوم (انگلش لینگوئج کورس)",
                    "Hifz Class": "حفظ کلاس",
                    "Abee Bin Kaab": "ابی بن کعب",
                    "Zaid Bin Sabit": "زید بن ثابت",
                    "Abdullah Bin Abbas": "عبداللہ بن عباس",
                    "Abdullah Bin Masood": "عبداللہ بن مسعود",
                    "Osman Ghani": "عثمان غنی",
                    "Musab Bin Omair": "مصعب بن عمیر",
                    "Abu Bakar Siddique": "ابوبکر صدیق",
                    "Amer Bin Khatab": "عمر بن خطاب",
                    "Naseerah Murseed": "نصیرہ مرشد",
                    "Tajweed Class 1st year": "تجوید کلاس سال اول",
                    "Tajweed Class 2nd year": "تجوید کلاس سال دوم",
                    "Class 1st year": "تجوید کلاس سال اول",
                    "Class 2nd year": "تجوید کلاس سال دوم"
                };

                const deptUrdu = {
                    "Dars-e-Nizami Department": "شعبہ درس نظامی",
                    "Hifz Department": "شعبہ تحفیظ القرآن",
                    "Tajweed Department": "شعبہ تجوید و قرأت"
                };

                const displayDept = deptUrdu[dept] || dept;
                const displayClass = classUrdu[className] || className;

                const table = document.getElementById('reportTable');
                if (!table) throw new Error("Report not generated yet");

                window.PDFSnapshot.generate({
                    title: `${getTrans('attendance_report')}: ${monthVal}`,
                    subtitle: `${displayDept} | ${displayClass} | ${subject}`,
                    content: table.outerHTML,
                    orientation: 'landscape'
                });

            } catch (e) {
                console.error(e);
                alert("Error generating PDF: " + e.message);
            } finally {
                if (btn) { btn.disabled = false; btn.innerText = "Download PDF"; }
            }
        }
    </script>
</body>

</html>
