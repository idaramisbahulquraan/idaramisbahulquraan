<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <title>Login - School Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 data-i18n="welcome_back">Welcome Back</h1>
                <p data-i18n="sign_in_account">Sign in to your account</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email" data-i18n="login_id">Username / Email</label>
                    <input type="text" id="email" placeholder="username or admin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="role" data-i18n="select_role">Select Role</label>
                    <select id="role" required>
                        <option value="admin" data-i18n="admin">Admin</option>
                        <option value="teacher" data-i18n="teacher">Teacher</option>
                        <option value="nazim_e_taleemaat" data-i18n="nazim_e_taleemaat">Nazim e Taleemaat</option>
                        <option value="hifz_supervisor" data-i18n="hifz_supervisor">Hifz Supervisor</option>
                        <option value="student" data-i18n="student">Student</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" data-i18n="sign_in">Sign In</button>
            </form>

            <div style="margin-top: 1.25rem; display:flex; flex-direction:column; gap:0.75rem;">
                <div style="display:flex; align-items:center; gap:0.75rem; color: var(--text-light); font-size:0.875rem;">
                    <div style="flex:1; height:1px; background: var(--border-color);"></div>
                    <span data-i18n="or">OR</span>
                    <div style="flex:1; height:1px; background: var(--border-color);"></div>
                </div>
                <button type="button" id="googleSignInBtn" class="btn-secondary" data-i18n="continue_with_google">Continue with Google</button>
                <button type="button" id="microsoftSignInBtn" class="btn-secondary" data-i18n="continue_with_microsoft">Continue with Microsoft</button>
            </div>
            <div class="login-footer">
                <p><span data-i18n="forgot_password">Forgot password?</span> <a href="#"
                        data-i18n="contact_support">Contact Support</a></p>
            </div>
        </div>
    </div>
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
