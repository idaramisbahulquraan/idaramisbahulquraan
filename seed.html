    async function runSeedDepartments() {
      const btn = document.getElementById('seedDeptBtn');
      btn.disabled = true; btn.textContent = 'Seeding...';
      log('Starting Dept Seed...', 'info');
      try {
        for (const d of deptDataList) {
          let did;
          const q = await db.collection('departments').where('name', '==', d.department).get();
          if (q.empty) {
            const ref = await db.collection('departments').add({
              name: d.department, name_ur:
                DEPT_NAME_MAP[d.department] || '', createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }); did = ref.id;
            log(`Created ${d.department}`, 'success');
          }
          else {
            did = q.docs[0].id; await db.collection('departments').doc(did).update({
              name_ur: DEPT_NAME_MAP[d.department]
                || ''
            }); log(`${d.department} exists (Updated Urdu)`, 'warning');
          }

          for (const c of d.classes) {
            const cq = await db.collection('classes').where('name', '==', c).where('department', '==', d.department).get();
            if (cq.empty) {
              await db.collection('classes').add({
                name: c, name_ur: CLASS_NAME_MAP[c] || '', department:
                  d.department, sections: CLASS_SECTION_MAP[c] || [], createdAt: firebase.firestore.FieldValue.serverTimestamp()
              }); log(`Created ${c}`, 'success');
            } else {
              // Update existing class with Urdu name if missing or changed
              const cid = cq.docs[0].id;
              await db.collection('classes').doc(cid).update({
                name_ur: CLASS_NAME_MAP[c] || '',
                sections: CLASS_SECTION_MAP[c] || []
              });
              log(`${c} exists (Updated Urdu)`, 'warning');
            }
          }
        }
        log('Dept Seed Done.', 'success');
      } catch (e) { log(e.message, 'error'); }
      finally { btn.textContent = 'Seed Departments & Classes'; btn.disabled = false; }
    }
    function generateEmail(n, s) {
      let b = n.toLowerCase().replace(/[^a-z0-9]/g, '') || 'student';
      let e = `${b}@school.com`; let c = 1;
      while (s.has(e)) { e = `${b}${c}@school.com`; c++; }
      s.add(e); return e;
    }

    function generateUsername(fullName, seenUsernames) {
      const base = String(fullName || '').toLowerCase().replace(/[^a-z0-9]/g, '') || 'student';
      let username = base;
      let counter = 1;
      while (seenUsernames.has(username)) {
        username = `${base}${counter}`;
        counter++;
      }
      seenUsernames.add(username);
      return username;
    }

    function normalizeStudentText(value) {
      return String(value || '').trim().replace(/\s+/g, ' ').toLowerCase();
    }

    function splitStudentName(fullName) {
      const cleaned = String(fullName || '').trim().replace(/\s+/g, ' ');
      if (!cleaned) return { firstName: '', lastName: '' };
      const parts = cleaned.split(' ');
      const firstName = parts.shift() || '';
      return { firstName, lastName: parts.join(' ') };
    }

    function getStudentImportData() {
      return Array.isArray(window.STUDENT_IMPORT_DATA) ? window.STUDENT_IMPORT_DATA : [];
    }

    function buildStudentDuplicateKeys(student) {
      const classKey = normalizeStudentText(student.className);
      const rollKey = normalizeStudentText(student.rollNumber);
      const nameKey = normalizeStudentText(student.name || `${student.firstName || ''} ${student.lastName || ''}`.trim());
      const parentKey = normalizeStudentText(student.parentName);
      return [
        `${classKey}|${rollKey}|${parentKey}`,
        `${classKey}|${rollKey}|${nameKey}`,
        `${classKey}|${nameKey}|${parentKey}`,
        `${classKey}|${nameKey}`
      ].filter((value, index, list) => value && list.indexOf(value) === index);
    }

    async function runSeedStudents() {
      const btn = document.getElementById('seedStudentsBtn'); btn.disabled = true; btn.textContent = 'Seeding...';
      try {
        const students = getStudentImportData();
        if (!students.length) {
          throw new Error('Student import data is missing. Check js/student-seed-data.js.');
        }

        log(`Loaded ${students.length} student records from the selected workbook files.`, 'info');

        const emails = new Set();
        const usernames = new Set();
        (await db.collection('users').get()).forEach(d => {
          const data = d.data() || {};
          if (data.email) {
            emails.add(data.email);
            const emailLocalPart = String(data.email).split('@')[0].toLowerCase();
            if (emailLocalPart) usernames.add(emailLocalPart);
          }
          if (data.username) usernames.add(String(data.username).toLowerCase());
        });

        const known = new Set();
        (await db.collection('students').get()).forEach(d => {
          const data = d.data() || {};
          const existingName = `${data.firstName || ''} ${data.lastName || ''}`.trim() || data.name || '';
          buildStudentDuplicateKeys({
            className: data.className || '',
            rollNumber: data.rollNumber || '',
            parentName: data.parentName || '',
            name: existingName
          }).forEach(key => known.add(key));
        });

        const clsMap = {};
        (await db.collection('classes').get()).forEach(d => {
          const data = d.data() || {};
          if (data.name) clsMap[data.name] = data;
        });

        const tenantId = localStorage.getItem('tenant_id') || 'default';
        let createdCount = 0;
        let skippedExisting = 0;
        let skippedMissingClass = 0;

        for (const item of students) {
          const classInfo = clsMap[item.className];
          if (!classInfo) {
            skippedMissingClass++;
            log(`Skipping ${item.name}: class ${item.className} not found in classes collection`, 'warning');
            continue;
          }

          const { firstName, lastName } = splitStudentName(item.name);
          const preparedStudent = {
            ...item,
            firstName,
            lastName
          };
          const duplicateKeys = buildStudentDuplicateKeys(preparedStudent);
          if (duplicateKeys.some(key => known.has(key))) {
            skippedExisting++;
            continue;
          }

          const username = generateUsername(`${firstName}${lastName}`, usernames);
          const email = `${username}@school.com`;
          emails.add(email);
          const passwordToUse = `${firstName || 'student'}786`;
          try {
            const uc = await secondaryAuth.createUserWithEmailAndPassword(email, passwordToUse);
            await uc.user.updateProfile({ displayName: item.name });
            await db.collection("users").doc(uc.user.uid).set({
              uid: uc.user.uid,
              email,
              username,
              role: 'student',
              name: item.name,
              localPassword: passwordToUse,
              tenantId,
              createdAt:
                firebase.firestore.FieldValue.serverTimestamp()
            });

            await db.collection("students").doc(uc.user.uid).set({
              uid: uc.user.uid,
              userId: uc.user.uid,
              firstName,
              lastName,
              name: item.name,
              name_ur: '',
              email,
              username,
              studentEmail: email,
              department: item.department,
              department_ur: DEPT_NAME_MAP[item.department] || '',
              className: item.className,
              className_ur: classInfo.name_ur || CLASS_NAME_MAP[item.className] || '',
              rollNumber: item.rollNumber || '',
              parentName: item.parentName || '',
              parentPhone: item.parentPhone || '',
              gender: item.gender || 'Male',
              session: item.session || '',
              role: 'student',
              tenantId,
              sourceFile: item.sourceFile || '',
              sourceClass: item.sourceClass || '',
              localPassword: passwordToUse,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            duplicateKeys.forEach(key => known.add(key));
            createdCount++;
            log(`Created ${item.name} (${item.className}) -> username: ${username}`, 'success');
          } catch (e) { log(e.message, 'error'); }
        }

        log(`Student seeding complete. Created ${createdCount}, skipped ${skippedExisting} existing, ${skippedMissingClass} missing class mappings.`, 'success');
      } catch (e) { log(e.message, 'error'); } finally { btn.disabled = false; btn.textContent = 'Seed Students'; }
    }

    function parseHifzStudentData() {
      if (typeof rawHifzStudentData !== 'string') return [];
      const lines = rawHifzStudentData.trim().split('\n');
      const students = [];
      for (let i = 5; i < lines.length; i++) {
        const line = lines[i]; if (!line.trim()) continue; let parts = line.split('\t');
        if (parts.length < 5) parts = line.split(/ {2,}/); if (parts.length >= 2) {
          students.push({ name: parts[0], fatherName: parts[7] || '', className: parts[parts.length - 1] || 'Hifz Class' });
        }
      }
      return students;
    }
    async function runSeedHifzStudents() {
      const btn = document.getElementById('seedHifzBtn'); btn.disabled = true; btn.textContent = 'Seeding...';
      try {
        const students = parseHifzStudentData();
        const ems = new Set();
        (await db.collection('users').get()).forEach(d => ems.add(d.data().email));
        for (const s of students) {
          const email = generateEmail(s.name, ems);
          try {
            const uc = await secondaryAuth.createUserWithEmailAndPassword(email, "password123");
            await uc.user.updateProfile({ displayName: s.name });
            await db.collection("users").doc(uc.user.uid).set({
              email, role: 'student', name: s.name, createdAt:
                firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection("students").add({
              userId: uc.user.uid, firstName: s.name, fatherName: s.fatherName, department:
                'Hifz Department', className: s.className, email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            log(`Created ${s.name}`, 'success');
          } catch (e) { log(e.message, 'error'); }
        }
        log('Hifz Seed Done', 'success');
      } catch (e) { log(e.message, 'error'); } finally { btn.disabled = false; btn.textContent = 'Seed Hifz Students'; }

      const parts = cleaned.split(' ');
      const firstName = parts.shift() || '';
      return { firstName, lastName: parts.join(' ') };

    function getCanonicalTeacherName(name) {
      const cleaned = String(name || '').trim().replace(/\s+/g, ' ');
      if (!cleaned) return '';
      return TEACHER_NAME_ALIASES[cleaned.toLowerCase()] || cleaned;

            const emailLocalPart = String(data.email).split('@')[0].toLowerCase();
            if (emailLocalPart) usernames.add(emailLocalPart);
          }
          if (data.username) usernames.add(String(data.username).toLowerCase());
        });
        (await db.collection('teachers').get()).forEach(d => {
          const data = d.data() || {};
          const fullName = `${data.firstName || ''} ${data.lastName || ''}`.trim() || data.name || '';
          if (fullName) existingTeachers.add(fullName.toLowerCase());
        });

        const tenantId = localStorage.getItem('tenant_id') || 'default';
        for (const t of getTeacherSeedList()) {
          if (existingTeachers.has(String(t.name || '').toLowerCase())) {
            log(`${t.name} exists`, 'warning');
            continue;
          }

          const { firstName, lastName } = splitTeacherName(t.name);
          const username = generateUsername(`${firstName}${lastName}`, usernames);
          const email = `${username}@school.com`;
          ems.add(email);
          const passwordToUse = `${firstName || 'teacher'}786`;
          try {
            const uc = await secondaryAuth.createUserWithEmailAndPassword(email, passwordToUse);
            await uc.user.updateProfile({ displayName: t.name });
            await db.collection("users").doc(uc.user.uid).set({
              uid: uc.user.uid,
              email,
              username,
              role: 'teacher',
              name: t.name,
              localPassword: passwordToUse,
              tenantId,
              createdAt:
                firebase.firestore.FieldValue.serverTimestamp()
            });

            await db.collection("teachers").doc(uc.user.uid).set({
              uid: uc.user.uid,
              userId: uc.user.uid,
              firstName,
              lastName,
              name: t.name,
              email,
              username,
              localPassword: passwordToUse,
              fatherName: t.fatherName || '',
              department: t.department,
              department_ur: DEPT_NAME_MAP[t.department] || '',
              cnic: t.cnic || '',
              mobile: t.mobile || '',
              phone: t.mobile || '',
              salary: t.salary || '',
              address: t.address || '',
              joiningDate: t.joiningDate || '',
              role: 'teacher',
              tenantId,
              createdAt:
                firebase.firestore.FieldValue.serverTimestamp()
            });
            existingTeachers.add(String(t.name || '').toLowerCase());
            log(`Created ${t.name} -> username: ${username}`, 'success');
          } catch (e) {
            if (e.code === 'auth/email-already-in-use') log(`${t.name} exists`, 'warning'); else log(e.message,
              'error');
          }
        }
        log('Teacher seeding done', 'success');
      } catch (e) { log(e.message, 'error'); } finally { btn.disabled = false; btn.textContent = 'Seed Teachers'; }
    }

    function getTeacherAssignmentSeedData() {
      return Array.isArray(window.TEACHER_ASSIGNMENT_SEED_DATA) ? window.TEACHER_ASSIGNMENT_SEED_DATA : [];
    }

    function parseAssignmentSections(sectionValue) {
      const raw = String(sectionValue || '').trim();
      if (!raw) return [];
      return raw.split(/\s*(?:\||&|\/|,)\s*/).map(s => s.trim()).filter(Boolean);
    }

    function normalizeNameKey(value) {
      return String(value || '').trim().replace(/\s+/g, ' ').toLowerCase();
    }

    function normalizeBookKey(value) {
      return String(value || '').trim().replace(/\s+/g, ' ');
    }

    function getTeacherLookupKeys(name) {
      const canonicalName = getCanonicalTeacherName(name);
      const keys = new Set();
      const addKey = (value) => {
        const key = normalizeNameKey(value);
        if (key) keys.add(key);
      };

      addKey(name);
      addKey(canonicalName);

      Object.entries(TEACHER_NAME_ALIASES).forEach(([alias, canonical]) => {
        if (normalizeNameKey(canonical) === normalizeNameKey(canonicalName)) {
          addKey(alias);
        }
      });

      return Array.from(keys);
    }

    async function runSeedTeacherAssignments() {
      const btn = document.getElementById('seedTeacherAssignmentsBtn');
      btn.disabled = true;
      btn.textContent = 'Seeding...';
      try {
        const assignments = getTeacherAssignmentSeedData();
        if (!assignments.length) throw new Error('Teacher assignment seed data is missing. Check js/teacher-assignment-seed-data.js.');

        const teacherMap = new Map();
        (await db.collection('teachers').get()).forEach(doc => {
          const data = doc.data() || {};
          const fullName = `${data.firstName || ''} ${data.lastName || ''}`.trim() || data.name || '';
          if (!fullName) return;
          const teacherRecord = {
            id: doc.id,
            name: fullName,
            name_ur: data.name_ur || ''
          };
          getTeacherLookupKeys(fullName).forEach(key => {
            if (!teacherMap.has(key)) teacherMap.set(key, teacherRecord);
          });
        });

        const subjectDocs = [];
        (await db.collection('subjects').get()).forEach(doc => {
          subjectDocs.push({ id: doc.id, ref: doc.ref, ...(doc.data() || {}) });
        });

        let updatedCount = 0;
        let missingTeachers = 0;
        let missingSubjects = 0;

        for (const assignment of assignments) {
          const teacherNames = Array.isArray(assignment.canonicalTeacherNames)
            ? assignment.canonicalTeacherNames.map(getCanonicalTeacherName)
            : [];
          const teacherRecords = teacherNames
            .map(name => teacherMap.get(normalizeNameKey(name)))
            .filter(Boolean);

          if (teacherRecords.length !== teacherNames.length) {
            missingTeachers++;
            log(`Teacher missing for assignment: ${assignment.extractedSubject} / ${assignment.appClassName} / ${teacherNames.join(', ')}`, 'warning');
            continue;
          }

          const targetSections = parseAssignmentSections(assignment.section);
          const appSubjectNames = Array.isArray(assignment.appSubjectNames) ? assignment.appSubjectNames.map(normalizeNameKey) : [];
          const appBookNames = Array.isArray(assignment.appBookNames) ? assignment.appBookNames.map(normalizeBookKey) : [];

          const matches = subjectDocs.filter(subject => {
            if ((subject.className || '') !== assignment.appClassName) return false;

            const subjectSections = Array.isArray(subject.sections) ? subject.sections.map(String) : [];
            if (targetSections.length > 0 && subjectSections.length > 0) {
              const overlaps = targetSections.some(section => subjectSections.includes(section));
              if (!overlaps) return false;
            }

            const nameMatch = appSubjectNames.length === 0 || appSubjectNames.includes(normalizeNameKey(subject.name));
            const bookMatch = appBookNames.length === 0 || appBookNames.includes(normalizeBookKey(subject.book));
            return nameMatch && bookMatch;
          });

          if (!matches.length) {
            missingSubjects++;
            log(`Subject missing for assignment: ${assignment.extractedSubject} / ${assignment.appClassName}`, 'warning');
            continue;
          }

          const primaryTeacher = teacherRecords[0];
          const teacherIds = teacherRecords.map(t => t.id);
          const teacherNamesDisplay = teacherRecords.map(t => t.name);
          const teacherNameJoined = teacherNamesDisplay.join(' / ');

          for (const match of matches) {
            await match.ref.set({
              teacherId: primaryTeacher.id,
              teacherName: teacherNameJoined,
              teacherName_ur: '',
              teacherIds,
              teacherNames: teacherNamesDisplay,
              coTeacherIds: teacherIds.slice(1),
              coTeacherNames: teacherNamesDisplay.slice(1),
              sharedTeacherAssignment: teacherIds.length > 1,
              sections: Array.isArray(match.sections) && match.sections.length > 0 ? match.sections : targetSections,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            updatedCount++;
          }

          log(`Assigned ${teacherNameJoined} -> ${assignment.extractedSubject} (${assignment.appClassName})`, 'success');
        }

        log(`Teacher subject assignments complete. Updated ${updatedCount} subject records, ${missingTeachers} teacher issues, ${missingSubjects} subject issues.`, 'success');
      } catch (e) {
        log(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Seed Teacher Subject Assignments';
      }
    }
    async function deleteUrduTeachers() {
      if (!confirm('Delete Urdu Teachers?')) return;
      try {
        const snap = await db.collection('teachers').get();
        const urduRegex = /[\u0600-\u06FF]/;
        let c = 0;
        for (const d of snap.docs) {
          if (urduRegex.test(d.data().firstName)) {
            await db.collection('teachers').doc(d.id).delete();
            if (d.data().userId) await db.collection('users').doc(d.data().userId).delete();
            c++;
          }
        }
        log(`Deleted ${c} teachers`, 'success');
      } catch (e) { log(e.message, 'error'); }
    }

    function addSectionsToSyllabusClass(className, sections) {
      if (!Array.isArray(syllabusData[className])) return;
      syllabusData[className] = syllabusData[className].map(item => ({
        ...item,
        sections: Array.isArray(item.sections) && item.sections.length > 0 ? item.sections : sections
      }));
    }

    function ensureSyllabusEntry(className, entry) {
      if (!Array.isArray(syllabusData[className])) syllabusData[className] = [];
      const targetSections = Array.isArray(entry.sections) ? entry.sections.slice().sort().join('|') : '';
      const exists = syllabusData[className].some(item =>
        (item.subject || '') === (entry.subject || '') &&
        (item.book || '') === (entry.book || '') &&
        (item.term || 'Annual') === (entry.term || 'Annual') &&
        ((Array.isArray(item.sections) ? item.sections.slice().sort().join('|') : '') === targetSections)
      );
      if (!exists) syllabusData[className].push(entry);
    }

    function normalizeSeedPlanValue(value) {
      return String(value || '').trim().replace(/\s+/g, ' ');
    }

    function buildSyllabusPlanDocId(className, subjectData, part = '') {
      return [
        'plan',
        className,
        subjectData.subject || subjectData.name || '',
        subjectData.term || 'Annual',
        subjectData.book || '',
        part || ''
      ].map(value => normalizeSeedPlanValue(value).replace(/[\/\\?#%\*:|"<>]/g, '-').replace(/\s+/g, '_')).filter(Boolean).join('__');
    }

    function buildSubjectPlanDefaultsMap() {
      const map = new Map();
      Object.entries(syllabusPlanData).forEach(([cls, items]) => {
        items.forEach(item => {
          const itemBooks = Array.isArray(item.books) && item.books.length > 0
            ? item.books
            : [{ name: item.book || '', totalPages: item.totalPages || 0, monthlyTargets: item.monthlyTargets || {} }];

          itemBooks.forEach((bookItem) => {
            const key = [
              cls,
              item.subject || '',
              item.term || 'Annual',
              bookItem.name || item.book || ''
            ].map(normalizeSeedPlanValue).join('||');

            map.set(key, {
              totalPages: bookItem.totalPages || item.totalPages || 0,
              monthlyTargets: bookItem.monthlyTargets || item.monthlyTargets || {},
              books: itemBooks,
              dailyPages: bookItem.dailyPages || '',
              teachingDays: bookItem.teachingDays || 0,
              monthlyPages: bookItem.monthlyPages || 0
            });
          });
        });
      });
      return map;
    }

    const subjectPlanDefaultsMap = buildSubjectPlanDefaultsMap();

    async function runSeedSubjects() {
      const btn = document.getElementById('seedSubjectsBtn'); btn.disabled = true; btn.textContent = 'Seeding...';
      try {
        // Map: Name -> { id, department, name_ur, department_ur }
        const maps = {};
        (await db.collection('classes').get()).forEach(d => {
          const data = d.data();
          maps[data.name] = {
            id: d.id,
            department: data.department,
            name_ur: data.name_ur || '',
            department_ur: DEPT_NAME_MAP[data.department] || ''
          };
        });

        let tid = null;
        const tq = await db.collection('teachers').where('firstName', '==', 'Unassigned Teacher').get();
        if (!tq.empty) tid = tq.docs[0].id;

        for (const [cn, subs] of Object.entries(syllabusData)) {
          if (!maps[cn]) { log(`Class ${cn} missing`, 'warning'); continue; }

          const classInfo = maps[cn];

          for (const s of subs) {
            // Check existence by name + classId
            const sq = await db.collection('subjects')
              .where('classId', '==', classInfo.id)
              .where('name', '==', s.subject)
              .get();

            const targetTerm = s.term || 'Annual';
            const targetBook = s.book || '';
            const targetSections = Array.isArray(s.sections) ? s.sections : [];
            const planDefaultsKey = [cn, s.subject || '', targetTerm, targetBook].map(normalizeSeedPlanValue).join('||');
            const planDefaults = subjectPlanDefaultsMap.get(planDefaultsKey) || {};
            const sameTermBookDocs = !sq.empty
              ? sq.docs.filter(d => (d.data().term || 'Annual') === targetTerm && ((d.data().book || '') === targetBook))
              : [];

            const nameUr = s.subject_ur || SUBJECT_NAME_MAP[s.subject] || s.subject || '';

            if (sameTermBookDocs.length > 0) {
              for (const d of sameTermBookDocs) {
                await d.ref.set({
                  name: s.subject,
                  classId: classInfo.id,
                  className: cn,
                  className_ur: classInfo.name_ur || '',
                  department: classInfo.department,
                  department_ur: classInfo.department_ur || '',
                  teacherId: tid || '',
                  book: s.book,
                  authorPublisher: s.authorPublisher || '',
                  name_ur: nameUr,
                  description: s.details,
                  sections: targetSections,
                  term: targetTerm,
                  totalPages: planDefaults.totalPages || 0,
                  monthlyTargets: planDefaults.monthlyTargets || {},
                  books: planDefaults.books || [],
                  dailyPages: planDefaults.dailyPages || '',
                  teachingDays: planDefaults.teachingDays || 0,
                  monthlyPages: planDefaults.monthlyPages || 0,
                  updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
              }
              log(`Updated ${s.subject} (${targetTerm})`, 'success');
            } else {
              await db.collection('subjects').add({
                name: s.subject,
                classId: classInfo.id,
                className: cn, // English name for filters
                className_ur: classInfo.name_ur || '', // Urdu for display
                department: classInfo.department, // English for filters
                department_ur: classInfo.department_ur || '', // Urdu for display
                teacherId: tid || '',
                book: s.book,
                authorPublisher: s.authorPublisher || '',
                name_ur: nameUr,
                description: s.details,
                sections: targetSections,
                term: targetTerm,
                totalPages: planDefaults.totalPages || 0,
                monthlyTargets: planDefaults.monthlyTargets || {},
                books: planDefaults.books || [],
                dailyPages: planDefaults.dailyPages || '',
                teachingDays: planDefaults.teachingDays || 0,
                monthlyPages: planDefaults.monthlyPages || 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              log(`Added ${s.subject} (${targetTerm})`, 'success');
            }
          }
        }
        log('Subjects Done', 'success');
      } catch (e) { log(e.message, 'error'); } finally { btn.disabled = false; btn.textContent = 'Seed Subjects'; }
    }

    async function runSeedSyllabusPlans() {
      const btn = document.getElementById('seedSyllabusPlansBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Seeding...'; }
      try {
        const classMap = {};
        (await db.collection('classes').get()).forEach(d => {
          const data = d.data();
          classMap[data.name] = {
            id: d.id,
            department: data.department,
            name_ur: data.name_ur || ''
          };
        });

        const subjectMap = {};
        const allSubjectDocs = [];
        (await db.collection('subjects').get()).forEach(d => {
          const s = d.data();
          allSubjectDocs.push({ id: d.id, ...s });
          const key = `${s.className || ''}||${(s.name || '').trim()}||${(s.term || 'Annual').trim()}||${(s.book || '').trim()}`;
          subjectMap[key] = { id: d.id, ...s };
        });

        let added = 0;
        let ensured = 0;
        for (const [cls, items] of Object.entries(syllabusPlanData)) {
          if (!classMap[cls]) { log(`Class not found for plans: ${cls}`, 'warning'); continue; }
          for (const item of items) {
            const itemBooks = Array.isArray(item.books) && item.books.length > 0
              ? item.books
              : [{ name: item.book || '', totalPages: item.totalPages || 0, monthlyTargets: item.monthlyTargets || {} }];

            for (const b of itemBooks) {
              const key = `${cls}||${(item.subject || '').trim()}||${(item.term || 'Annual').trim()}||${(b.name || '').trim()}`;
              const s = subjectMap[key];
              if (!s) {
                log(`Subject not found for plan: ${key}`, 'warning');
                continue;
              }

              const planId = buildSyllabusPlanDocId(cls, {
                subject: s.name || item.subject || '',
                term: item.term || 'Annual',
                book: s.book || b.name || item.book || ''
              });
              await db.collection('syllabus_plans').doc(planId).set({
                department: s.department || '',
                className: cls,
                subjectId: s.id,
                subject: s.name_ur || s.name || '',
                subjectPart: '',
                teacherId: s.teacherId || '',
                teacherName: s.teacherName || '',
                book: s.book || b.name || item.book || '',
                authorPublisher: s.authorPublisher || '',
                details: s.description || '',
                term: item.term || 'Annual',
                totalPages: b.totalPages || 0,
                monthlyTargets: b.monthlyTargets || {},
                books: [b],
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              }, { merge: true });
              added++;
            }
          }
        }

        for (const s of allSubjectDocs) {
          if (!s.className || !s.name) continue;

          const fallbackBooks = Array.isArray(s.books) && s.books.length > 0
            ? s.books
            : [{
              name: s.book || '',
              totalPages: s.totalPages || 0,
              monthlyTargets: s.monthlyTargets || {},
              dailyPages: s.dailyPages || '',
              teachingDays: s.teachingDays || 0,
              monthlyPages: s.monthlyPages || 0
            }];

          const planId = buildSyllabusPlanDocId(s.className, {
            subject: s.name,
            term: s.term || 'Annual',
            book: s.book || ''
          });

          const totalPages = Number(s.totalPages || 0) || fallbackBooks.reduce((sum, book) => sum + (Number(book.totalPages || 0) || 0), 0);

          await db.collection('syllabus_plans').doc(planId).set({
            department: s.department || '',
            className: s.className || '',
            className_ur: s.className_ur || '',
            subjectId: s.id,
            subject: s.name_ur || s.name || '',
            subjectPart: '',
            teacherId: s.teacherId || '',
            teacherName: s.teacherName || '',
            book: s.book || '',
            authorPublisher: s.authorPublisher || '',
            details: s.description || '',
            term: s.term || 'Annual',
            totalPages,
            monthlyTargets: s.monthlyTargets || {},
            books: fallbackBooks,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          ensured++;
        }

        log(`Syllabus plans seeded: ${added}; ensured from all subjects: ${ensured}`, 'success');
      } catch (e) {
        log(e.message, 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Seed Syllabus Plans (Targets)'; }
      }
    }

    async function resetSyllabusData() {

      log('Resetting...', 'info');
      try {
        const ssn = await db.collection('subjects').get();
        let b = db.batch(); let c = 0;
        for (const d of ssn.docs) { b.delete(d.ref); c++; if (c > 400) { await b.commit(); b = db.batch(); c = 0; } }

        log(`Deleted ${ssn.size} subjects`, 'success');

        const csn = await db.collection('classes').where('department', '==', 'Dars-e-Nizami Department').get();
        b = db.batch(); c = 0;
        for (const d of csn.docs) { b.delete(d.ref); c++; if (c > 400) { await b.commit(); b = db.batch(); c = 0; } }
        if (c > 0) await b.commit();
        log(`Deleted ${csn.size} classes`, 'success');
      } catch (e) { log(e.message, 'error'); }
    }

    async function runMigrateClasses() {
      if (!confirm("This will rename 'Old' classes to 'New' classes for ALL existing students. Continue?")) return;

      const mapping = {
        "Aama Arzbic (A)": "Aamma Year 1 (Arabic Language Foundation Course)",
        "Aama Arabic (B)": "Aamma Year 1 (Arabic Language Foundation Course)",
        "Aama English": "Aamma Year 2 (English Language Foundation Course)",
        "Khasa - I": "Khassa Year 1",
        "Khasa - II": "Khassa Year 2",
        "Aalia - I (X)": "Aliya Year 1",
        "Aalia - II (XI)": "Aliya Year 2",
        "Aalamia - I (XII)": "Alamiya Year 1",
        "Almia - II (XI)": "Alamiya Year 2"
      };

      log("Starting Class Migration...", 'info');

      try {
        const snap = await db.collection("students").get();
        let batch = db.batch();
        let count = 0;
        let totalUpdated = 0;

        for (const doc of snap.docs) {
          const s = doc.data();
          const oldClass = s.className;

          if (mapping[oldClass]) {
            const newClass = mapping[oldClass];
            batch.update(doc.ref, {
              className: newClass,
              migratedAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Also update user doc if it exists and has class info (standard structure usually doesn't, but no harm checking)
            // Actually, users collection usually just has role/email/name. Class is in students collection.

            count++;
            if (count >= 400) {
              await batch.commit();
              batch = db.batch();
              totalUpdated += count;
              count = 0;
              log(`Migrated ${totalUpdated} students...`, 'info');
            }
          }
        }

        if (count > 0) {
          await batch.commit();
          totalUpdated += count;
        }

        log(`Migration Complete. Updated ${totalUpdated} students.`, 'success');

      } catch (e) {
        log(`Error: ${e.message}`, 'error');
        console.error(e);
      }
    }
